name: sankofa_twi
description: "Sankofa Twi — Akan heritage learning."
publish_to: "none"
version: 1.0.0+21

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.10
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  audioplayers: ^6.1.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_storage: ^12.3.2
  # firebase_messaging: ^15.1.3  # tabled until launch — re-enable with the real NotificationService body
  cloud_firestore: ^5.4.4
  cloud_functions: ^5.1.3
  google_sign_in: ^6.2.1
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  google_mlkit_image_labeling: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/content/
    - assets/sfx/
    - assets/audio/
    - assets/mascot/
    - assets/mascot/stageclear/
    - assets/mascot/trotro/
    - assets/mascot/trotro_gameplay/      # gameplay bus (map, garage, rally)
    - assets/mascot/trotro_gameplay/kente/   # roof-kente trim cosmetics
    # Accessory layers — uncomment each folder once you add its PNGs:
    # - assets/mascot/trotro_gameplay/rim/
    # - assets/mascot/trotro_gameplay/roof/
    - assets/icon/app_icon.png

# Run once after `flutter pub get`:  dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "assets/icon/app_icon_background.png"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
